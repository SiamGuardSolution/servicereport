<!doctype html>
<html lang="th">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Siamguard – Field App</title>
  <!-- โฮสต์ใต้ /servicereport -->
  <base href="/servicereport/">
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <style>
    body{font-family:system-ui,sans-serif;padding:16px}
    label{display:block;margin:12px 0 6px}
    input,select,button{width:100%;padding:10px;font-size:16px}
    button[disabled]{opacity:.6}
    .hint{color:#666;font-size:14px}
  </style>
</head>
<body>
  <h2>ลงทะเบียนพนักงาน</h2>
  <div id="status" class="hint">กำลังตรวจสอบ ...</div>

  <form id="form" style="display:none">
    <label>ชื่อที่แสดง</label><input id="display" readonly />
    <label>เบอร์โทร</label>
    <input id="phone" placeholder="08xxxxxxxx" inputmode="tel" />
    <label>ทีม</label>
    <select id="team"><option value="">-- เลือกทีม --</option></select>
    <button id="btnSave" type="submit" style="margin-top:12px">บันทึก</button>
  </form>

  <script>
  // TODO: ใส่ค่าจริงของคุณ
  const LIFF_ID = '2007877821-J8jyx6YN';
  const GAS = 'https://script.google.com/macros/s/AKfycbyJucHRq6vbApfOgxelVKpsa0rGgKv_tKbrui--_CJsiXGqvaEqEvfeubSOize3UMaU/exec';

  function setStatus(msg){ document.getElementById('status').textContent = msg || ''; }
  function setSaving(b){ document.getElementById('btnSave').disabled = !!b; }

  async function loadTeams(){
    try{
      const r = await fetch(GAS + '?route=teams.list', { cache:'no-store' });
      const j = await r.json();
      if(j.ok){
        const sel = document.getElementById('team');
        (j.data||[]).filter(t=>t.active).forEach(t=>{
          const o = document.createElement('option');
          o.value = t.team_name; o.textContent = t.team_name; sel.appendChild(o);
        });
      } else {
        setStatus('โหลดรายชื่อทีมไม่สำเร็จ');
      }
    }catch(err){
      setStatus('โหลดรายชื่อทีมผิดพลาด: ' + String(err));
    }
  }

  (async ()=>{
    try{
      await liff.init({ liffId: LIFF_ID });

      if (!liff.isLoggedIn()) { liff.login(); return; }
      if (!liff.isInClient()) { setStatus('กรุณาเปิดลิงก์นี้ในแอป LINE'); return; }

      const prof = await liff.getProfile();
      document.getElementById('display').value = prof.displayName || '';
      setStatus('พบบัญชี: ' + (prof.displayName||''));

      await loadTeams();
      document.getElementById('form').style.display = 'block';

      // autofill phone จาก localStorage
      const savedPhone = localStorage.getItem('my_phone')||'';
      if(savedPhone) document.getElementById('phone').value = savedPhone;

      document.getElementById('form').addEventListener('submit', async (e)=>{
        e.preventDefault();

        const phone = document.getElementById('phone').value.trim();
        const team  = document.getElementById('team').value.trim();

        if (!team){ setStatus('กรุณาเลือกทีม'); return; }
        if (phone) localStorage.setItem('my_phone', phone);

        const payload = {
          lineUid: prof.userId,
          display: prof.displayName || '',
          phone,
          team_name: team
        };

        try{
          setSaving(true);
          setStatus('กำลังบันทึก…');

          // สำคัญ: ใช้ text/plain เพื่อหลบ CORS preflight ของ Apps Script
          const res = await fetch(GAS + '?route=staff.upsert', {
            method: 'POST',
            headers: { 'Content-Type': 'text/plain;charset=utf-8' },
            body: JSON.stringify(payload),
            redirect: 'follow',
            credentials: 'omit'
          });

          const text = await res.text();
          let data; try{ data = JSON.parse(text); }catch{ data = { ok:false, error:'bad json', raw:text }; }

          if (data.ok){
            setStatus('บันทึกเรียบร้อย');
            // ปิดหน้าต่างเมื่ออยู่ใน LINE
            if (liff.isInClient()) setTimeout(()=>liff.closeWindow(), 500);
          } else {
            setStatus('บันทึกล้มเหลว: ' + (data.error || 'unknown'));
          }
        }catch(err){
          setStatus('เกิดข้อผิดพลาด: ' + String(err));
        }finally{
          setSaving(false);
        }
      });
    }catch(err){
      setStatus('Error: ' + String(err));
    }
  })();
  </script>
</body>
</html>
